name: Daily Racing Checks

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 16 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run morning script
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 7'))
        env:
          RACING_API_USERNAME: ${{ secrets.RACING_API_USERNAME }}
          RACING_API_PASSWORD: ${{ secrets.RACING_API_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ALL_RUNNERS: ${{ secrets.TELEGRAM_CHANNEL_ALL_RUNNERS }}
          TELEGRAM_CHANNEL_PYTHIA_PURCHASES: ${{ secrets.TELEGRAM_CHANNEL_PYTHIA_PURCHASES }}
          TELEGRAM_CHANNEL_PYTHIA_TOP30: ${{ secrets.TELEGRAM_CHANNEL_PYTHIA_TOP30 }}
          TELEGRAM_CHANNEL_BLANDFORD: ${{ secrets.TELEGRAM_CHANNEL_BLANDFORD }}
        run: python fetch_runners.py

      - name: Run afternoon results script
        if: github.event_name == 'schedule' && startsWith(github.event.schedule, '0 16')
        env:
          RACING_API_USERNAME: ${{ secrets.RACING_API_USERNAME }}
          RACING_API_PASSWORD: ${{ secrets.RACING_API_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_results.py

      - name: Run evening results script
        if: github.event_name == 'schedule' && startsWith(github.event.schedule, '0 20')
        env:
          RACING_API_USERNAME: ${{ secrets.RACING_API_USERNAME }}
          RACING_API_PASSWORD: ${{ secrets.RACING_API_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_results.py

      - name: Save results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily racing data update"
          git push
