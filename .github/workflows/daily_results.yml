name: Daily Evening Results

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run results script
        env:
          RACING_API_USERNAME: ${{ secrets.RACING_API_USERNAME }}
          RACING_API_PASSWORD: ${{ secrets.RACING_API_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ALL_RUNNERS: ${{ secrets.TELEGRAM_CHANNEL_ALL_RUNNERS }}
          TELEGRAM_CHANNEL_PYTHIA_TOP50: ${{ secrets.TELEGRAM_CHANNEL_PYTHIA_TOP50 }}
          TELEGRAM_CHANNEL_PYTHIA_PURCHASES: ${{ secrets.TELEGRAM_CHANNEL_PYTHIA_PURCHASES }}
          TELEGRAM_CHANNEL_BLANDFORD: ${{ secrets.TELEGRAM_CHANNEL_BLANDFORD }}
          TELEGRAM_CHANNEL_SUMMARY: ${{ secrets.TELEGRAM_CHANNEL_SUMMARY }}
        run: python fetch_results.py

      - name: Save results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily results update"
          git push
